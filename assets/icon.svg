<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- maskable safe area: keep content within central 80% -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="#ffffff" font-family="'Hiragino Sans','Yu Gothic',sans-serif" text-anchor="middle">
    <text x="256" y="232" font-size="150" font-weight="700">算</text>
    <text x="256" y="372" font-size="150" font-weight="700">数</text>
  </g>
  <g stroke="#bfdbfe" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="120" y1="120" x2="160" y2="120"/>
    <line x1="140" y1="100" x2="140" y2="140"/>
    <line x1="360" y1="400" x2="400" y2="400"/>
  </g>
</svg>
