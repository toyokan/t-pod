name: Validate event data

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Install event tooling
        run: python -m pip install -r requirements-tools.txt

      - name: Validate event JSON and assets
        run: python scripts/validate_events.py

      - name: Run regression tests
        run: python -m unittest discover -s tests -v
