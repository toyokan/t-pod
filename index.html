<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- 静的タイトルは汎用。読み込み後に events/<id>.json の eventInfo.title で上書きされる -->
  <title>プログラム / タイムテーブル</title>
  <meta name="description" content="教育イベント・研究会向けタイムテーブル PWA" />

  <!-- theme-color（ステータスバー/ノッチ部の色）。LINE 等のアプリ内ブラウザはこの値を
       パース時に一度だけ読み、JS の事後更新を反映しないため、下の inline スクリプトが
       前回訪問時にキャッシュしたイベント色を「パース時点」で当てる（初回は既定=一覧の黄）。 -->
  <meta name="theme-color" content="#ffd900" />

  <!-- PWA -->
  <!-- マニフェスト/アプリ名はパース時に ?id から確定させる（iOS はホーム画面追加の値を
       パース時の静的タグから読むため、JS の事後差し替えでは間に合わない）。 -->
  <script>
    (function () {
      var id = (new URLSearchParams(location.search).get("id") || "");
      id = /^[A-Za-z0-9_-]+$/.test(id) ? id : "";
      var link = document.createElement("link");
      link.rel = "manifest";
      link.href = id ? ("events/" + id + ".webmanifest") : "manifest.json";
      document.head.appendChild(link);
      // イベントモードでは汎用 apple タイトルを置かず、manifest の name（=logoSub）を使わせる。
      if (!id) {
        var m = document.createElement("meta");
        m.name = "apple-mobile-web-app-title";
        m.content = "タイムテーブル";
        document.head.appendChild(m);
      }
      // 前回訪問時にキャッシュしたイベントのブランド色を theme-color と CSS 変数へ即時反映。
      try {
        var cached = id ? localStorage.getItem("t-pod:theme:" + id) : null;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta && cached && /^#([0-9a-fA-F]{3,4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(cached)) {
          meta.setAttribute("content", cached);
          document.documentElement.style.setProperty("--brand", cached);
        }
      } catch (e) {}
    })();
  </script>
  <!-- 一覧ページ（?id 無し）の既定 favicon は東洋館出版社サイトと同一のものを使用。
       イベントページでは applyAppIdentity() が logoMain に基づく専用アイコンに動的差し替えする。 -->
  <link rel="icon" type="image/jpeg" href="https://www.toyokan.co.jp/cdn/shop/files/logo_icon_5d362f00-a0a1-4cf8-b314-7a7caa0843e6.jpg?crop=center&height=32&width=32" />
  <link rel="apple-touch-icon" href="https://www.toyokan.co.jp/cdn/shop/files/logo_icon_5d362f00-a0a1-4cf8-b314-7a7caa0843e6.jpg?crop=center&height=180&width=180" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Webフォント（Zen Kaku Gothic New）。SWでキャッシュしオフライン時はシステムフォントに劣化 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (Play CDN) — 要件によりCDN読込。SWでキャッシュしオフライン対応 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
  theme: {
    extend: {
      colors: {
        // ブランド（テーマアクセント）色。基準色は CSS 変数 --brand（既定 amber）。
        // events/<id>.json の eventInfo.brandColor で --brand を上書きするとイベント毎に変化。
        brand: {
          50: "color-mix(in srgb, var(--brand) 8%, white)",
          100: "color-mix(in srgb, var(--brand) 16%, white)",
          200: "color-mix(in srgb, var(--brand) 30%, white)",
          300: "color-mix(in srgb, var(--brand) 45%, white)",
          400: "color-mix(in srgb, var(--brand) 70%, white)",
          500: "var(--brand)",
          fg: "var(--brand-fg)",
          600: "color-mix(in srgb, var(--brand) 82%, black)",
          700: "color-mix(in srgb, var(--brand) 62%, black)",
          800: "color-mix(in srgb, var(--brand) 48%, black)",
        },

        // 会場カラー：彩度・明度をそろえた配色
        venue: {
          blue:   { 100: "#e8f0f8", 300: "#9ebbd5", 500: "#4f7fa8", 700: "#315875" },
          green:  { 100: "#e6f2ed", 300: "#96c5b1", 500: "#4d9275", 700: "#326650" },
          violet: { 100: "#f0ebf5", 300: "#c2abd3", 500: "#8868a3", 700: "#5f4775" },
          coral:  { 100: "#faece8", 300: "#e7ad9e", 500: "#c86f59", 700: "#914b3a" },
        },
      },

      boxShadow: {
        card: "0 1px 3px 0 rgb(15 23 42 / 0.05)",
        now: "0 8px 24px -8px color-mix(in srgb, var(--brand) 55%, transparent)",
        fab: "0 8px 24px -6px color-mix(in srgb, var(--brand) 50%, transparent)",
      },
    },
  },

  future: { hoverOnlyWhenSupported: true },

  safelist: [
    "bg-venue-blue-100", "text-venue-blue-700",
    "bg-venue-blue-500", "border-venue-blue-300",
    "bg-venue-blue-700", "border-venue-blue-500",

    "bg-venue-green-100", "text-venue-green-700",
    "bg-venue-green-500", "border-venue-green-300",
    "bg-venue-green-700", "border-venue-green-500",

    "bg-venue-violet-100", "text-venue-violet-700",
    "bg-venue-violet-500", "border-venue-violet-300",

    "bg-venue-coral-100", "text-venue-coral-700",
    "bg-venue-coral-500", "border-venue-coral-300",

    "bg-slate-100", "bg-slate-200", "bg-slate-300",
    "text-slate-400", "text-slate-500", "text-slate-600",
    "bg-brand-50", "bg-brand-100", "bg-brand-200", "bg-brand-500", "bg-brand-600",
    "text-brand-500", "text-brand-600", "text-brand-700", "text-brand-800",
    "border-brand-100", "border-brand-200", "border-brand-300", "border-brand-500",
    "border", "border-2", "border-slate-200/80",
    "ring-brand-200", "ring-brand-600", "from-brand-500", "to-brand-600",
    "text-white", "text-brand-fg", "shadow-now", "rounded-2xl",
    "border-transparent", "shadow-fab", "font-extrabold",
  ],
};
  </script>
  <style>
    /* ブランド基準色（既定＝東洋館イメージカラーのゴールド。一覧ページの基調色）。
       events/<id>.json の brandColor で実行時に上書き */
    :root { --brand: #ffd900; --brand-fg: #ffffff; --brand-2: color-mix(in srgb, var(--brand) 68%, black); }
    /* 2a案：ヘッダーのグラデ強化＋要所グラデのユーティリティ */
    #appHeader {
      background: linear-gradient(135deg, color-mix(in srgb, var(--brand) 50%, white) 0%, var(--brand) 52%, var(--brand-2) 100%);
      box-shadow: 0 14px 30px -14px color-mix(in srgb, var(--brand-2) 55%, transparent);
    }
    #appHeader .deco { position: absolute; border-radius: 9999px; background: rgba(255,255,255,.16); pointer-events: none; }
    #appHeader #eventTitle { font-size: 1.7rem; letter-spacing: -.015em; text-shadow: 0 2px 6px color-mix(in srgb, var(--brand-2) 25%, transparent); }
    .grad-pill { background-image: linear-gradient(135deg, color-mix(in srgb, var(--brand) 55%, white) 0%, var(--brand) 45%, var(--brand-2) 100%); color: var(--brand-fg); }
    .dot-grad { background-image: linear-gradient(135deg, var(--brand), var(--brand-2)); }
    /* セーフエリア（ノッチ端末）対応 */
    .safe-area-top-bg {
      position: fixed;
      inset: 0 0 auto 0;
      height: env(safe-area-inset-top);
      background: var(--brand);
      z-index: 29;
      pointer-events: none;
    }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .scroll-x { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-x::-webkit-scrollbar { display: none; }
    html { scroll-behavior: smooth; }
    a, button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }
    body { overscroll-behavior-y: contain; }
    body.modal-open { overflow: hidden; }
    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* スクロール時のヘッダー縮小（縦空間の確保）。縮小時はテーマ・副題を畳む */
    #appHeader .hd { transition: padding .15s ease; }
    #appHeader #eventTitle { transition: font-size .15s ease; }
    #appHeader.is-compact .hd { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    #appHeader.is-compact #eventTitle { font-size: 1.125rem; }
    #appHeader.is-compact #eventSubtitle { display: none; }
    #appHeader.is-compact #themeBanner { display: none; }
    /* カードのフェードイン */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: fadeInUp .28s ease both; }
    @media (prefers-reduced-motion: reduce) {
      .animate-in, .animate-pulse { animation: none; }
      html { scroll-behavior: auto; }
      #appHeader .hd, #appHeader #eventTitle { transition: none; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="safe-area-top-bg" aria-hidden="true"></div>

  <!-- ===== Sticky ヘッダー（テーマ・お知らせベルを統合） ===== -->
  <header id="appHeader" class="sticky top-0 z-30 max-w-2xl mx-auto pt-safe text-brand-fg rounded-b-[32px] relative overflow-hidden">
    <span class="deco" style="top:-56px;right:-40px;width:170px;height:170px" aria-hidden="true"></span>
    <span class="deco" style="top:26px;right:52px;width:56px;height:56px;background:rgba(255,255,255,.13)" aria-hidden="true"></span>
    <span class="deco" style="bottom:-70px;left:-30px;width:190px;height:190px;background:rgba(255,255,255,.1)" aria-hidden="true"></span>
    <div class="hd relative px-5 pt-4 pb-3.5">
      <div class="flex items-center justify-between gap-3">
        <div class="min-w-0">
          <h1 id="eventTitle" class="text-2xl font-black leading-tight tracking-tight">読み込み中…</h1>
          <p id="eventSubtitle" class="text-[11px] font-semibold opacity-85 mt-0.5"></p>
        </div>
        <!-- お知らせ（旧FABをヘッダーへ移設） -->
        <button id="noticeBtn" aria-label="お知らせを見る"
          class="relative hidden flex-shrink-0 w-10 h-10 rounded-full bg-white/25 border border-white/30 items-center justify-center active:scale-95 transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
          <span id="noticeBadge" class="hidden absolute -top-1.5 -right-1.5 bg-rose-500 text-white text-[10px] min-w-[18px] h-[18px] px-1 rounded-full items-center justify-center font-black ring-2 ring-white"></span>
        </button>
      </div>
      <div id="themeBanner" class="hidden mt-3 bg-white/20 rounded-full px-4 py-2 text-xs font-bold leading-relaxed">
        <span class="inline-block align-middle text-[10px] font-black tracking-widest mr-2 bg-white rounded-full px-2 py-0.5" style="color:var(--brand-2)">テーマ</span><span id="themeText"></span>
      </div>
    </div>
  </header>

  <!-- ===== オフライン表示バナー（通信断のとき表示） ===== -->
  <div id="offlineBanner" class="hidden max-w-2xl mx-auto mt-2 px-3">
    <div class="flex items-center gap-2 bg-slate-800 text-white/90 text-xs font-medium rounded-lg px-3 py-2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 flex-shrink-0" aria-hidden="true"><path d="M12 20h.01"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 13a10 10 0 0 1 5.24-2.76"/><path d="m2 2 20 20"/></svg>
      <span>オフライン — 保存済みの情報を表示しています</span>
    </div>
  </div>

  <!-- ===== ホーム画面に追加バナー（既定 hidden。イベントモードかつ未インストール時のみ表示） ===== -->
  <div id="installBanner" class="hidden max-w-2xl mx-auto mt-2 px-3">
    <div class="flex items-center gap-3 bg-brand-50 border border-brand-200 rounded-xl px-3.5 py-2.5 shadow-card">
      <span class="flex-shrink-0 w-9 h-9 rounded-lg bg-brand-500 text-brand-fg flex items-center justify-center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
      </span>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-bold text-brand-800 leading-tight">アプリとして追加</div>
        <div class="text-[11px] text-slate-600 leading-tight mt-0.5">ホーム画面に追加するとすばやく開けます</div>
      </div>
      <button id="installBtn" class="flex-shrink-0 text-xs font-bold text-brand-fg bg-brand-600 rounded-lg px-4 py-2.5 active:scale-95 transition">追加</button>
      <button id="installDismiss" aria-label="閉じる" class="flex-shrink-0 text-slate-400 p-2.5 -m-1 active:scale-95 transition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== メインコンテンツ ===== -->
  <main class="max-w-2xl mx-auto px-4 pt-4 pb-28">

    <!-- 読み込みエラー表示 -->
    <div id="errorBox" class="hidden bg-red-50 border border-red-300 text-red-700 rounded-lg p-4 text-sm">
      <p>データの読み込みに失敗しました。通信環境をご確認のうえ、ページを再読み込みしてください。</p>
      <a href="./" class="inline-block mt-2 text-brand-600 font-medium underline">イベント一覧へ戻る</a>
    </div>

    <!-- 読み込み中スケルトン（データ取得完了で非表示） -->
    <div id="skeleton" aria-hidden="true" class="space-y-3 animate-pulse">
      <div class="h-9 bg-slate-200/80 rounded-xl"></div>
      <div class="h-24 bg-slate-200/80 rounded-2xl"></div>
      <div class="h-24 bg-slate-200/70 rounded-2xl"></div>
      <div class="h-24 bg-slate-200/60 rounded-2xl"></div>
    </div>

    <!-- (0) イベント一覧（?id 無しのとき表示） -->
    <section id="view-list" class="view hidden">
      <h2 class="text-base font-bold text-slate-700 mb-3">イベント一覧</h2>
      <div id="eventList" class="space-y-3"></div>
    </section>

    <!-- (1) プログラム -->
    <section id="view-program" class="view">
      <!-- 日付切替（セグメンテッドコントロール） -->
      <nav id="dateTabs" class="flex bg-slate-200/70 rounded-full p-1 gap-1 mb-3" aria-label="開催日"></nav>
      <div class="flex items-center justify-between mb-3">
        <div id="dayMeta" class="text-xs font-bold text-slate-500"></div>
        <button id="jumpNow" class="hidden text-[11px] font-black grad-pill shadow-fab rounded-full px-3 py-1.5 active:scale-95 transition">▼ いまの予定へ</button>
      </div>
      <div id="timetable"></div>
    </section>

    <!-- (2) 資料 -->
    <section id="view-materials" class="view hidden space-y-5">
      <h2 class="text-base font-bold text-slate-700">資料・会場案内</h2>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">会場マップ</h3>
        <div class="bg-white border border-slate-200/80 rounded-2xl overflow-hidden shadow-card">
          <img id="venueMap" alt="会場マップ" class="w-full" />
          <p id="venueNote" class="text-xs text-slate-600 p-3 leading-relaxed"></p>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">配布資料</h3>
        <div id="resourceLinks" class="space-y-2"></div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">アンケート・各種フォーム</h3>
        <div id="formLinks" class="space-y-2"></div>
      </div>
    </section>

    <!-- (3) 書籍 -->
    <section id="view-books" class="view hidden">
      <h2 class="text-base font-bold text-slate-700 mb-3">関連書籍</h2>
      <div id="bookSale" class="mb-4"></div>
      <div id="bookList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </section>
  </main>

  <!-- ===== ボトムナビ（3タブ） ===== -->
  <nav id="bottomNav" class="fixed bottom-0 inset-x-0 z-30 max-w-2xl mx-auto bg-white border-t border-slate-200/80 rounded-t-2xl shadow-[0_-4px_20px_-4px_rgba(15,23,42,0.12)] pb-safe">
    <div class="grid grid-cols-3 px-2 pt-1.5">
      <button data-tab="program" class="navbtn group flex justify-center" aria-label="TIMETABLE">
        <span class="navpill flex flex-col items-center gap-1 min-h-[48px] px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition group-active:scale-95">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>TIMETABLE</span>
        </span>
      </button>
      <button data-tab="materials" class="navbtn group flex justify-center" aria-label="FILES">
        <span class="navpill flex flex-col items-center gap-1 min-h-[48px] px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition group-active:scale-95">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
          <span>FILES</span>
        </span>
      </button>
      <button data-tab="books" class="navbtn group flex justify-center" aria-label="BOOKS">
        <span class="navpill flex flex-col items-center gap-1 min-h-[48px] px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition group-active:scale-95">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
          <span>BOOKS</span>
        </span>
      </button>
    </div>
  </nav>

  <!-- ===== 汎用モーダル ===== -->
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" class="hidden fixed inset-0 z-40 flex items-end sm:items-center justify-center">
    <div id="modalBackdrop" class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto overscroll-contain shadow-2xl animate-in">
      <div class="sticky top-0 bg-white/95 backdrop-blur flex items-center justify-between px-4 py-3 border-b border-slate-100">
        <h3 id="modalTitle" class="font-bold text-slate-800"></h3>
        <button id="modalClose" aria-label="閉じる" class="text-slate-400 hover:text-slate-600 rounded-lg p-2.5 -my-1.5 -mr-2 active:scale-95 transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="p-4 text-sm text-slate-700 space-y-3"></div>
    </div>
  </div>

  <!-- ===== LINE 友だち追加ポップアップ（初回・イベントページのみ） ===== -->
  <div id="linePopup" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
    <div id="linePopupBackdrop" class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-2xl overflow-hidden shadow-2xl animate-in">
      <button id="linePopupClose" aria-label="閉じる" class="absolute top-2 right-2 z-10 text-slate-400 hover:text-slate-600 rounded-lg p-2.5 active:scale-95 transition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="px-6 pt-8 pb-6 text-center">
        <div class="mx-auto w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-md" style="background:#06C755">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-9 h-9" aria-hidden="true"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
        </div>
        <h3 class="mt-4 text-lg font-bold text-slate-800">最新情報を LINE でお届け</h3>
        <p class="mt-2 text-sm text-slate-600 leading-relaxed">新刊・イベントのご案内を LINE でお送りします。よろしければ友だち追加をお願いします。</p>
        <div class="mt-6 space-y-2.5">
          <a id="linePopupCta" href="#" target="_blank" rel="noopener"
             class="flex items-center justify-center gap-2 w-full py-3 rounded-xl font-bold text-white shadow-sm active:scale-[.99] transition"
             style="background:#06C755">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
            東洋館出版社公式LINEを追加する
          </a>
          <button id="linePopupLater" class="w-full py-2.5 rounded-xl text-sm font-medium text-slate-500 hover:bg-slate-50 transition">あとで</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    // ---- 会場テーマカラー辞書 ----
    // events/<id>.json の rooms[].color が指すキー。クラスは <head> の safelist で保持。
    // chip=ラベル, dot=タイムライン上の点。
    const COLOR = {
      blue:      { chip: "bg-venue-blue-100 text-venue-blue-700",     dot: "bg-venue-blue-500" },
      blueDeep:  { chip: "bg-venue-blue-700 text-white",              dot: "bg-venue-blue-700" },
      green:     { chip: "bg-venue-green-100 text-venue-green-700",   dot: "bg-venue-green-500" },
      greenDeep: { chip: "bg-venue-green-700 text-white",             dot: "bg-venue-green-700" },
      orange:    { chip: "bg-venue-coral-100 text-venue-coral-700",   dot: "bg-venue-coral-500" },
      purple:    { chip: "bg-venue-violet-100 text-venue-violet-700", dot: "bg-venue-violet-500" },
    };
    const NEUTRAL = { chip: "bg-slate-100 text-slate-600", dot: "bg-slate-300" };

    let ROOM_COLOR = {};
    const roomColor = (label) => COLOR[ROOM_COLOR[label]] || NEUTRAL;

    // ---- ブランド色（イベント毎・単色指定。濃淡は color-mix で自動生成） ----
    const isHexColor = (c) => typeof c === "string" && /^#([0-9a-fA-F]{3,4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(c.trim());
    function relativeLuminance(hex) {
      let h = hex.trim().slice(1);
      if (h.length <= 4) h = [...h].map((c) => c + c).join("");
      const lin = (v) => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); };
      return 0.2126 * lin(parseInt(h.slice(0, 2), 16))
           + 0.7152 * lin(parseInt(h.slice(2, 4), 16))
           + 0.0722 * lin(parseInt(h.slice(4, 6), 16));
    }
    function updateBrandFg(color) {
      if (!isHexColor(color)) return;
      const fg = relativeLuminance(color) > 0.55 ? "#1e293b" : "#ffffff";
      document.documentElement.style.setProperty("--brand-fg", fg);
    }
    function applyBrandColor(color) {
      if (!isHexColor(color)) { updateBrandFg(resolvedBrand()); return; }
      const c = color.trim();
      document.documentElement.style.setProperty("--brand", c);
      updateBrandFg(c);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", c);
      try { const id = getEventId(); if (id) localStorage.setItem("t-pod:theme:" + id, c); } catch (e) {}
    }

    // 運営系カテゴリ（受付・休憩など）はコンパクト表示、授業・提案系はカードで強調
    const isAdminCat = (cat) => /受付|昼食|昼休憩|休憩|閉会|事務|理事|挨拶|諸連絡/.test(cat || "");

    // ---- SVG アイコン（Lucide 系・stroke=currentColor） ----
    const ICONS = {
      calendar: '<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>',
      mapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
      file: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8M16 13H8M16 17H8"/>',
      form: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
      book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2"/>',
      chevron: '<path d="m9 18 6-6-6-6"/>',
      clock: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
      alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4M12 17h.01"/>',
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>',
      share: '<path d="M12 2v13"/><path d="m8 6 4-4 4 4"/><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/>',
      plusSquare: '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8M8 12h8"/>',
      close: '<path d="M18 6 6 18M6 6l12 12"/>',
      line: '<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>',
      store: '<path d="M2 7 4 4h16l2 3"/><path d="M2 7a3 3 0 0 0 6 0 3 3 0 0 0 6 0 3 3 0 0 0 6 0"/><path d="M4 9v11a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/>',
    };
    function icon(name, cls = "w-5 h-5") {
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}" aria-hidden="true">${ICONS[name] || ""}</svg>`;
    }

    // ---- 状態 ----
    let DATA = null;
    let activeDateId = null;
    let activeTab = "program";

    // ---- 「現在時刻」追従の状態 ----
    let didAutoScroll = false;
    let nowTimer = null;
    let currentRows = [];
    let currentSessions = [];
    let currentDayObj = null;

    const toMin = (t) => {
      const m = /^(\d{1,2}):(\d{2})/.exec(String(t || ""));
      return m ? +m[1] * 60 + +m[2] : null;
    };
    const localDateStr = (d = new Date()) =>
      `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

    // ---- ユーティリティ ----
    const $ = (id) => document.getElementById(id);
    const el = (tag, cls, html) => {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html != null) e.innerHTML = html;
      return e;
    };
    const escapeHtml = (s) =>
      String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const fmtMD = (d, sep = "月") => {
      const [, m, day] = String(d || "").split("-");
      if (!m || !day) return "";
      return sep === "月" ? `${+m}月${+day}日` : `${+m}${sep}${+day}`;
    };
    // scrollIntoView は使わず、ヘッダー分のオフセットを取って scrollTo する
    function scrollToRow(row) {
      if (!row) return;
      const top = row.getBoundingClientRect().top + window.scrollY - 150;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    // ---- 起動 ----
    function getEventId() {
      const id = new URLSearchParams(location.search).get("id") || "";
      return /^[A-Za-z0-9_-]+$/.test(id) ? id : "";
    }

    function setMode(mode) {
      const isEvent = mode === "event";
      $("dateTabs").classList.toggle("hidden", !isEvent);
      document.getElementById("bottomNav").classList.toggle("hidden", !isEvent);
      $("noticeBtn").classList.toggle("hidden", !isEvent);
      $("noticeBtn").classList.toggle("flex", isEvent);
      $("view-list").classList.toggle("hidden", isEvent);
      $("view-program").classList.toggle("hidden", !isEvent);
      document.querySelector("main").classList.toggle("pb-28", isEvent);
      document.querySelector("main").classList.toggle("pb-8", !isEvent);
    }

    async function init() {
      updateBrandFg(resolvedBrand());
      registerSW();
      setupInstallPrompt();
      const id = getEventId();
      try {
        if (id) {
          const res = await fetch(`events/${id}.json`, { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          DATA = await res.json();
          setMode("event");
          renderAll();
          showLinePromo();
        } else {
          const res = await fetch("events.json", { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const index = await res.json();
          setMode("list");
          renderEventList(index);
          showLinePromo();
        }
      } catch (err) {
        console.error(err);
        setMode("list");
        $("errorBox").classList.remove("hidden");
      } finally {
        $("skeleton").classList.add("hidden");
      }
    }

    // ---- イベント一覧（?id 無し） ----
    function renderEventList(index) {
      $("eventTitle").textContent = index.siteTitle || "イベント一覧";
      $("eventSubtitle").textContent = index.siteSubtitle || "";
      document.title = index.siteTitle || document.title;

      const wrap = $("eventList");
      wrap.innerHTML = "";
      const events = (index.events || [])
        .slice()
        .sort((a, b) => String(b.sortDate || "").localeCompare(String(a.sortDate || "")));

      if (!events.length) {
        wrap.appendChild(el("p", "text-sm text-slate-500 py-8 text-center", "公開中のイベントはありません。"));
        return;
      }

      events.forEach((ev, idx) => {
        const card = el("a", "group relative block bg-white border border-slate-200/80 rounded-2xl p-4 pl-5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition animate-in overflow-hidden");
        card.href = "?id=" + encodeURIComponent(ev.id);
        card.style.animationDelay = idx * 40 + "ms";
        if (isHexColor(ev.brandColor)) card.style.setProperty("--brand", ev.brandColor.trim());
        card.innerHTML =
          `<span class="absolute left-0 inset-y-0 w-1.5 bg-brand-500"></span>` +
          `<div class="text-sm font-bold text-slate-800 leading-snug pr-6">${escapeHtml(ev.title || ev.id)}</div>` +
          (ev.theme ? `<div class="text-xs text-brand-700 mt-1">テーマ：${escapeHtml(ev.theme)}</div>` : "") +
          (ev.dateRange ? `<div class="flex items-center gap-1.5 text-xs text-slate-500 mt-2">${icon("calendar", "w-4 h-4 text-slate-400")}<span>${escapeHtml(ev.dateRange)}</span></div>` : "") +
          (ev.venueName ? `<div class="flex items-center gap-1.5 text-xs text-slate-500 mt-1">${icon("mapPin", "w-4 h-4 text-slate-400")}<span>${escapeHtml(ev.venueName)}</span></div>` : "") +
          `<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 group-hover:text-brand-400 group-hover:translate-x-0.5 transition">${icon("chevron", "w-5 h-5")}</span>`;
        wrap.appendChild(card);
      });
    }

    function renderAll() {
      const info = DATA.eventInfo || {};
      applyBrandColor(info.brandColor);
      // グラデ終端色（任意）。未指定時は --brand を黒側に振った既定値
      if (isHexColor(info.brandColor2)) document.documentElement.style.setProperty("--brand-2", info.brandColor2.trim());
      else document.documentElement.style.removeProperty("--brand-2");
      $("eventTitle").textContent = info.logoMain || info.title || "イベント";
      $("eventSubtitle").textContent = info.logoSub || info.subtitle || "";
      applyAppIdentity(info);

      ROOM_COLOR = {};
      (DATA.rooms || []).forEach((r) => { ROOM_COLOR[r.id] = r.color; ROOM_COLOR[r.name] = r.color; });

      // テーマ（ヘッダー内バナー）
      if (info.theme) {
        $("themeText").textContent = info.theme;
        $("themeBanner").classList.remove("hidden");
      }

      renderDateTabs();
      renderMaterials();
      renderBooks();
      renderNoticeBadge();
      setTab("program");
      showInstallBanner();
    }

    // ---- 日付タブ（セグメンテッドコントロール） ----
    function renderDateTabs() {
      const tabs = $("dateTabs");
      tabs.innerHTML = "";
      const dates = (DATA.eventInfo && DATA.eventInfo.dates) || [];
      const todayStr = localDateStr();
      if (!activeDateId && dates.length) {
        const todayObj = dates.find((d) => d.date === todayStr);
        activeDateId = (todayObj || dates[0]).id;
      }

      dates.forEach((d) => {
        const isActive = d.id === activeDateId;
        const isToday = d.date === todayStr;
        const btn = el(
          "button",
          "flex-1 min-w-0 px-2 py-2 rounded-full text-sm transition active:scale-[.98] " +
            (isActive ? "bg-white text-slate-800 font-extrabold shadow-card" : "text-slate-500 font-semibold hover:bg-slate-100"),
          escapeHtml(d.label) +
            (d.date ? `<span class="ml-1 text-[11px] font-medium ${isActive ? "text-slate-400" : "opacity-70"}">${escapeHtml(fmtMD(d.date, "/"))}${d.weekday ? "(" + escapeHtml(d.weekday) + ")" : ""}</span>` : "") +
            (isToday ? `<span class="inline-block align-middle w-1.5 h-1.5 rounded-full bg-brand-500 ml-1.5" aria-hidden="true"></span>` : "")
        );
        btn.type = "button";
        btn.setAttribute("aria-pressed", String(isActive));
        btn.onclick = () => { activeDateId = d.id; renderDateTabs(); };
        tabs.appendChild(btn);
      });
      renderTimetable();
    }

    // ---- タイムテーブル（左レール＋カード。運営系はコンパクト表示） ----
    function renderTimetable() {
      const wrap = $("timetable");
      wrap.innerHTML = "";

      const dayObj = ((DATA.eventInfo && DATA.eventInfo.dates) || []).find((d) => d.id === activeDateId);
      if (dayObj) {
        const md = fmtMD(dayObj.date);
        $("dayMeta").textContent =
          `${dayObj.label || ""}　${md}${dayObj.weekday ? "(" + dayObj.weekday + ")" : ""}` +
          (dayObj.time ? `　${dayObj.time}` : "");
      } else {
        $("dayMeta").textContent = "";
      }

      const sessions = (DATA.sessions || []).filter((s) => s.dateId === activeDateId);
      if (!sessions.length) {
        wrap.appendChild(el("p", "text-sm text-slate-500 py-8 text-center", "この日のプログラムはまだ登録されていません。"));
        return;
      }

      // レール（縦線）付きコンテナ
      const list = el("div", "relative pl-[18px]");
      list.appendChild(el("div", "absolute left-[5px] top-2 bottom-2 w-0.5 bg-slate-200 rounded", ""));

      const rows = [];
      sessions.forEach((s, idx) => {
        const admin = isAdminCat(s.category);
        const row = el("div", "relative mb-2.5 animate-in");
        row.style.animationDelay = idx * 30 + "ms";
        rows.push(row);

        // レールの点
        const roomItem = (s.items || []).find((it) => it.room);
        const dot = roomItem ? roomColor(roomItem.room).dot : admin ? NEUTRAL.dot : "dot-grad";
        row.appendChild(el("span", `now-dot absolute -left-[18px] ${admin ? "top-3" : "top-3.5"} w-3 h-3 rounded-full ring-4 ring-slate-50 ${dot}`, ""));

        if (admin) {
          // 運営系（受付・昼食など）：時刻＋名称のコンパクト行
          const bar = el("div", "session-card bg-slate-200/60 rounded-full px-4 py-2 flex items-center gap-2.5");
          bar.innerHTML =
            `<span class="text-[12.5px] font-extrabold tabular-nums text-slate-500">${escapeHtml(s.start || "")}</span>` +
            `<span class="text-[12.5px] font-bold text-slate-500">${escapeHtml(s.category || "")}</span>` +
            (s.note ? `<span class="text-[11px] text-slate-400 truncate">${escapeHtml(s.note)}</span>` : "");
          row.appendChild(bar);
        } else {
          // 内容カード
          const card = el("div", "session-card bg-white border border-slate-200/80 rounded-2xl p-3.5 shadow-card");
          const range = s.end ? `${escapeHtml(s.start)}–${escapeHtml(s.end)}` : escapeHtml(s.start || "");
          let html =
            `<div class="now-slot"></div>` +
            `<div class="flex items-center justify-between gap-2">` +
            `<span class="cat-chip inline-block text-[11px] font-black text-brand-700 bg-brand-50 border border-brand-200 rounded-full px-3 py-1 transition">${escapeHtml(s.category || "")}</span>` +
            `<div class="text-[11px] font-extrabold tabular-nums text-slate-400 flex-shrink-0">${range}</div>` +
            `</div>`;
          if (s.note) html += `<p class="text-xs text-slate-500 mt-1.5 leading-relaxed">${escapeHtml(s.note)}</p>`;
          (s.items || []).forEach((it) => {
            html += `<div class="mt-2.5 first-of-type:mt-2">`;
            html += `<div class="flex items-baseline gap-2 flex-wrap">`;
            if (it.room) {
              const c = roomColor(it.room);
              html += `<span class="flex-shrink-0 text-[10.5px] font-extrabold px-2 py-0.5 rounded-md ${c.chip}">${escapeHtml(it.room)}</span>`;
            }
            if (it.title) html += `<span class="text-[12.5px] font-bold text-slate-800">${escapeHtml(it.title)}</span>`;
            html += `</div>`;
            (it.meta || []).forEach((m) => {
              html += `<div class="text-xs text-slate-500 leading-relaxed mt-0.5">${escapeHtml(m)}</div>`;
            });
            html += `</div>`;
          });
          card.innerHTML = html;
          row.appendChild(card);
        }
        list.appendChild(row);
      });
      wrap.appendChild(list);

      currentRows = rows;
      currentSessions = sessions;
      currentDayObj = dayObj || null;
      updateNowMarker(true);
      if (!nowTimer) nowTimer = setInterval(() => updateNowMarker(false), 60000);
    }

    // 当日なら「進行中／直近」のセッション行 index を返す（それ以外は -1）
    function findNowIdx(sessions, dayObj) {
      if (!dayObj || dayObj.date !== localDateStr()) return -1;
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      let idx = -1;
      sessions.forEach((s, i) => {
        const st = toMin(s.start);
        if (st !== null && st <= nowMin) idx = i;
      });
      return idx;
    }

    // 「現在」ハイライト：進行中カードに枠＋進行中バッジ＋経過バー＋残り時間（再描画なし）
    function updateNowMarker(allowScroll) {
      if (!currentRows.length) return;
      const idx = findNowIdx(currentSessions, currentDayObj);
      const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
      let showJump = false;

      currentRows.forEach((row, i) => {
        const card = row.querySelector(".session-card");
        const dotEl = row.querySelector(".now-dot");
        if (!card) return;
        const badge = card.querySelector(".now-badge");
        const isCard = card.classList.contains("bg-white");
        const on = i === idx;
        if (on) {
          const s = currentSessions[i];
          const stMin = toMin(s.start);
          const endMin = toMin(s.end);
          const ongoing = endMin === null || nowMin < endMin;
          showJump = true;
          if (isCard) {
            card.classList.add("border-2", "border-brand-500", "shadow-now");
            card.classList.remove("border", "border-slate-200/80");
            const chip = card.querySelector(".cat-chip");
            if (chip) { chip.classList.add("grad-pill", "border-transparent"); chip.classList.remove("text-brand-700", "bg-brand-50", "border-brand-200"); }
          }
          if (dotEl) dotEl.classList.add("ring-brand-200");
          if (ongoing && isCard) {
            const remain = endMin !== null ? Math.max(0, endMin - nowMin) : null;
            const pct = (stMin !== null && endMin !== null && endMin > stMin)
              ? Math.min(100, Math.max(0, Math.round(((nowMin - stMin) / (endMin - stMin)) * 100))) : 0;
            const slot = card.querySelector(".now-slot");
            const html =
              `<div class="now-badge">` +
              `<div class="flex items-center gap-1.5 text-[11px] font-black text-brand-700 mb-1">` +
              `<span class="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>進行中` +
              (remain !== null ? ` · あと${remain}分` : "") + `</div>` +
              (endMin !== null ? `<div class="h-1 bg-brand-100 rounded-full mb-2 overflow-hidden"><div class="h-full grad-pill rounded-full" style="width:${pct}%"></div></div>` : "") +
              `</div>`;
            if (slot) slot.innerHTML = html;
            else if (badge) badge.outerHTML = html;
          } else if (!ongoing) {
            const slot = card.querySelector(".now-slot");
            if (slot) slot.innerHTML = "";
            if (badge) badge.remove();
          }
        } else {
          if (isCard) {
            card.classList.remove("border-2", "border-brand-500", "shadow-now");
            card.classList.add("border", "border-slate-200/80");
            const chip = card.querySelector(".cat-chip");
            if (chip) { chip.classList.remove("grad-pill", "border-transparent"); chip.classList.add("text-brand-700", "bg-brand-50", "border-brand-200"); }
          }
          if (dotEl) dotEl.classList.remove("ring-brand-200");
          const slot = card.querySelector(".now-slot");
          if (slot) slot.innerHTML = "";
          if (badge) badge.remove();
        }
      });

      $("jumpNow").classList.toggle("hidden", !(showJump && idx >= 0));
      $("jumpNow").onclick = () => scrollToRow(currentRows[idx]);

      if (allowScroll && !didAutoScroll && idx >= 0 && currentRows[idx]) {
        didAutoScroll = true;
        requestAnimationFrame(() => scrollToRow(currentRows[idx]));
      }
    }

    // ---- 資料タブ ----
    function renderMaterials() {
      const venue = (DATA.eventInfo && DATA.eventInfo.venue) || {};
      const map = $("venueMap");
      if (venue.mapImage) {
        map.src = venue.mapImage;
        map.classList.remove("hidden");
        map.onerror = () => map.classList.add("hidden");
      } else map.classList.add("hidden");
      $("venueNote").textContent = venue.mapNote || "";

      $("resourceLinks").innerHTML = "";
      (venue.resourceLinks || []).forEach((r) =>
        $("resourceLinks").appendChild(linkCard(r, "file"))
      );

      $("formLinks").innerHTML = "";
      ((DATA.eventInfo && DATA.eventInfo.forms) || []).forEach((f) =>
        $("formLinks").appendChild(linkCard(f, "form"))
      );
    }

    function linkCard(item, iconName) {
      const a = el(
        "a",
        "group flex items-center gap-3 bg-white border border-slate-200/80 rounded-2xl p-3.5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition"
      );
      a.href = item.url || "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML =
        `<span class="flex-shrink-0 w-10 h-10 rounded-xl bg-brand-50 text-brand-600 flex items-center justify-center">${icon(iconName)}</span>` +
        `<span class="flex-1 min-w-0">` +
        `<span class="block text-sm font-bold text-slate-800">${escapeHtml(item.label)}</span>` +
        (item.description ? `<span class="block text-xs text-slate-500 mt-0.5">${escapeHtml(item.description)}</span>` : "") +
        `</span>` +
        `<span class="text-slate-300 group-hover:text-brand-400 transition">${icon("chevron", "w-5 h-5")}</span>`;
      return a;
    }

    // ---- 書籍タブ ----
    function renderBooks() {
      renderBookSale();
      const list = $("bookList");
      list.innerHTML = "";
      (DATA.books || []).forEach((b) => {
        const card = el("a", "flex gap-3 bg-white border border-slate-200/80 rounded-2xl p-3.5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition");
        const trimmed = (v) => (typeof v === "string" ? v.trim() : "");
        card.href = trimmed(b.url) || trimmed(b.amazon_url) || "#";
        card.target = "_blank";
        card.rel = "noopener";
        const cover = typeof b.cover === "string" ? b.cover.trim() : "";
        const placeholder = `<div class="w-16 h-24 flex-shrink-0 rounded-lg bg-brand-50 text-brand-400 flex items-center justify-center">${icon("book", "w-7 h-7")}</div>`;
        card.innerHTML =
          (cover ? "" : placeholder) +
          `<div class="min-w-0">` +
          `<div class="text-sm font-bold text-slate-800 leading-snug">${escapeHtml(b.title)}</div>` +
          (b.author ? `<div class="text-xs text-slate-500 mt-0.5">${escapeHtml(b.author)}</div>` : "") +
          (b.publisher ? `<div class="text-[11px] text-slate-400">${escapeHtml(b.publisher)}</div>` : "") +
          (b.description ? `<div class="text-xs text-slate-600 mt-1 line-clamp-3">${escapeHtml(b.description)}</div>` : "") +
          `</div>`;
        if (cover) {
          const img = el("img", "w-16 h-24 object-cover rounded-lg flex-shrink-0 ring-1 ring-slate-200");
          img.src = cover;
          img.alt = "";
          img.loading = "lazy";
          img.addEventListener("error", () => { img.outerHTML = placeholder; });
          card.insertAdjacentElement("afterbegin", img);
        }
        list.appendChild(card);
      });
    }

    // イベント特設販売ページのリンク（eventInfo.bookSale がある時だけ表示）
    function renderBookSale() {
      const box = $("bookSale");
      box.innerHTML = "";
      const sale = (DATA.eventInfo && DATA.eventInfo.bookSale) || null;
      const trimmed = (v) => (typeof v === "string" ? v.trim() : "");
      const url = sale ? trimmed(sale.url) : "";
      if (!url) return;
      const label = trimmed(sale.label) || "特設販売ページを見る";
      const note = trimmed(sale.note);
      const card = el("a", "flex items-center gap-3 bg-gradient-to-br from-brand-500 to-brand-600 text-brand-fg rounded-2xl p-4 shadow-fab ring-1 ring-brand-600 hover:shadow-lg active:scale-[0.99] transition");
      card.href = url;
      card.target = "_blank";
      card.rel = "noopener";
      card.innerHTML =
        `<div class="w-11 h-11 flex-shrink-0 rounded-xl bg-white text-brand-600 flex items-center justify-center shadow-sm">${icon("store", "w-6 h-6")}</div>` +
        `<div class="min-w-0 flex-1">` +
        `<div class="inline-block text-[10px] font-bold tracking-wide bg-white text-brand-600 rounded-full px-2 py-0.5 mb-1">SALE</div>` +
        `<div class="text-sm font-bold text-brand-fg leading-snug">${escapeHtml(label)}</div>` +
        (note ? `<div class="text-xs text-brand-fg mt-0.5">${escapeHtml(note)}</div>` : "") +
        `</div>` +
        `<span class="flex-shrink-0 text-brand-fg">${icon("chevron", "w-5 h-5")}</span>`;
      box.appendChild(card);
    }

    // ---- お知らせ（ヘッダーのベル） ----
    // 既読は「お知らせの署名（title+body）」の集合で保持する。
    // 件数ではなく内容で判定するため、後からお知らせが追加・更新されると再びバッジが出る。
    const NOTICE_READ_KEY = () => "t-pod:notices-read:" + (getEventId() || "_");
    const noticeSig = (n) => (n.title || "") + "\u0000" + (n.body || "");

    function getReadNotices() {
      try {
        const raw = localStorage.getItem(NOTICE_READ_KEY());
        const arr = raw ? JSON.parse(raw) : [];
        return new Set(Array.isArray(arr) ? arr : []);
      } catch (e) { return new Set(); }
    }

    function markNoticesRead() {
      const notices = (DATA.eventInfo && DATA.eventInfo.notices) || [];
      try {
        localStorage.setItem(NOTICE_READ_KEY(), JSON.stringify(notices.map(noticeSig)));
      } catch (e) {}
    }

    function renderNoticeBadge() {
      const notices = (DATA.eventInfo && DATA.eventInfo.notices) || [];
      const badge = $("noticeBadge");
      const read = getReadNotices();
      const unread = notices.filter((n) => !read.has(noticeSig(n))).length;
      badge.textContent = String(unread);
      badge.classList.toggle("hidden", unread === 0);
      badge.classList.toggle("flex", unread > 0);
    }

    function openNotices() {
      const info = DATA.eventInfo || {};
      const notices = info.notices || [];
      let body = "";
      body +=
        `<div class="bg-brand-50 border border-brand-100 rounded-xl p-4">` +
        `<div class="text-base font-bold text-brand-800 leading-snug">${escapeHtml(info.title || "")}</div>` +
        (info.tagline ? `<div class="text-xs text-brand-600 mt-0.5">${escapeHtml(info.tagline)}</div>` : "") +
        (info.theme ? `<div class="text-sm text-brand-700 mt-2 font-medium">テーマ：${escapeHtml(info.theme)}</div>` : "") +
        (info.dateRange ? `<div class="flex items-center gap-1.5 text-xs text-slate-600 mt-2.5">${icon("calendar", "w-4 h-4 text-brand-500")}<span>${escapeHtml(info.dateRange)}</span></div>` : "") +
        (info.venueName ? `<div class="flex items-center gap-1.5 text-xs text-slate-600 mt-1">${icon("mapPin", "w-4 h-4 text-brand-500")}<span>${escapeHtml(info.venueName)}</span></div>` : "") +
        `</div>`;
      if (!notices.length) body += `<p class="text-sm text-slate-500">現在お知らせはありません。</p>`;
      notices.forEach((n) => {
        const important = n.level === "important";
        body +=
          `<div class="rounded-xl p-3.5 ${important ? "bg-brand-50 border border-brand-200" : "bg-slate-50 border border-slate-200"}">` +
          `<div class="flex items-start gap-2 font-semibold text-sm ${important ? "text-brand-800" : "text-slate-700"}">` +
          (important ? icon("alert", "w-4 h-4 mt-0.5 flex-shrink-0") : "") +
          `<span>${escapeHtml(n.title)}</span></div>` +
          `<div class="text-sm text-slate-600 mt-1 leading-relaxed">${escapeHtml(n.body)}</div></div>`;
      });
      openModal("概要・お知らせ", body);
      markNoticesRead();
      renderNoticeBadge();
    }

    // ---- モーダル ----
    let lastFocused = null;
    function openModal(title, html) {
      $("modalTitle").textContent = title;
      $("modalBody").innerHTML = html;
      lastFocused = document.activeElement;
      $("modal").classList.remove("hidden");
      document.body.classList.add("modal-open");
      $("modalClose").focus();
    }
    function closeModal() {
      if ($("modal").classList.contains("hidden")) return;
      $("modal").classList.add("hidden");
      document.body.classList.remove("modal-open");
      if (lastFocused && typeof lastFocused.focus === "function") lastFocused.focus();
      lastFocused = null;
    }

    // ---- タブ切替 ----
    function setTab(tab) {
      activeTab = tab;
      ["program", "materials", "books"].forEach((t) => {
        $("view-" + t).classList.toggle("hidden", t !== tab);
      });
      document.querySelectorAll(".navbtn").forEach((b) => {
        const on = b.dataset.tab === tab;
        if (on) b.setAttribute("aria-current", "page");
        else b.removeAttribute("aria-current");
        const pill = b.querySelector(".navpill");
        if (pill) {
          pill.classList.toggle("grad-pill", on);
          pill.classList.toggle("shadow-fab", on);
          pill.classList.toggle("font-extrabold", on);
          pill.classList.toggle("text-slate-400", !on);
        }
      });
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    // ---- Service Worker 登録 ----
    function registerSW() {
      if (!("serviceWorker" in navigator)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗", e));
      });
    }

    // ---- PWA アプリアイデンティティ（イベント毎にアイコン/名前/マニフェストを実行時生成） ----
    function resolvedBrand() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--brand").trim();
      return v || "#f59e0b";
    }
    function buildAppIconSvg(bg, label) {
      const chars = [...String(label || "")].slice(0, 3);
      const text = chars.join("");
      let fontSize;
      if (chars.length <= 1) fontSize = 280;
      else if (chars.length === 2) fontSize = 220;
      else fontSize = 150;
      const texts =
        `<text x="256" y="256" font-size="${fontSize}" font-weight="800" text-anchor="middle" dominant-baseline="central">${escapeHtml(text)}</text>`;
      return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">`
        + `<rect width="512" height="512" rx="96" fill="${escapeHtml(bg)}"/>`
        + `<g fill="${escapeHtml(isHexColor(bg) && relativeLuminance(bg) > 0.55 ? "#1e293b" : "#ffffff")}" font-family="'Zen Kaku Gothic New','Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif">${texts}</g>`
        + `</svg>`;
    }
    const svgToDataUri = (svg) => "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    function rasterize(svg, size) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const cv = document.createElement("canvas");
            cv.width = cv.height = size;
            cv.getContext("2d").drawImage(img, 0, 0, size, size);
            resolve(cv.toDataURL("image/png"));
          } catch (e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = svgToDataUri(svg);
      });
    }
    async function applyAppIdentity(info) {
      const name = info.logoMain || info.title || "イベント";
      const shortName = name;
      document.title = name;
      let appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if (!appleTitle) {
        appleTitle = document.createElement("meta");
        appleTitle.name = "apple-mobile-web-app-title";
        document.head.appendChild(appleTitle);
      }
      appleTitle.setAttribute("content", name);
      if (!info.logoMain) return;
      const bg = resolvedBrand();
      const svg = buildAppIconSvg(bg, info.iconLabel || info.logoMain);
      const svgUri = svgToDataUri(svg);
      const [png512, png192] = await Promise.all([rasterize(svg, 512), rasterize(svg, 192)]);
      const apple = document.querySelector('link[rel="apple-touch-icon"]');
      if (apple && png512) apple.setAttribute("href", png512);
      const fav = document.querySelector('link[rel="icon"]');
      if (fav) fav.setAttribute("href", svgUri);

      const link = document.querySelector('link[rel="manifest"]');
      if (!link) return;
      if (/^events\/[A-Za-z0-9_-]+\.webmanifest$/.test(info.manifestPath || "")) {
        link.setAttribute("href", info.manifestPath);
        return;
      }
      const id = getEventId();
      const startUrl = new URL(id ? `./?id=${encodeURIComponent(id)}` : "./", location.href).href;
      const scope = new URL("./", location.href).href;
      const icons = [];
      if (png192) icons.push({ src: png192, sizes: "192x192", type: "image/png", purpose: "any" });
      if (png512) icons.push({ src: png512, sizes: "512x512", type: "image/png", purpose: "any" });
      icons.push({ src: svgUri, sizes: "any", type: "image/svg+xml", purpose: "maskable" });
      const manifest = {
        name, short_name: shortName,
        description: info.theme || name,
        lang: "ja",
        id: startUrl, start_url: startUrl, scope,
        display: "standalone", orientation: "portrait",
        background_color: "#f8fafc", theme_color: bg,
        icons,
      };
      link.setAttribute("href", "data:application/manifest+json;charset=utf-8," + encodeURIComponent(JSON.stringify(manifest)));
    }

    // ---- ホーム画面に追加の導線 ----
    let deferredPrompt = null;
    const isStandalone = () =>
      (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
      window.navigator.standalone === true;
    const isIos = () =>
      /iphone|ipad|ipod/i.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const INSTALL_DISMISS_KEY = "t-pod:install-dismissed";

    // ---- LINE 友だち追加ポップアップ（東洋館出版社 公式・全イベント共通） ----
    const LINE_PROMO_URL = "https://page.line.me/bsi8018g";
    const LINE_DISMISS_KEY = "t-pod:line-promo-dismissed";
    function dismissLinePromo() {
      if ($("linePopup").classList.contains("hidden")) return;
      $("linePopup").classList.add("hidden");
      document.body.classList.remove("modal-open");
      try { localStorage.setItem(LINE_DISMISS_KEY, "1"); } catch (e) {}
    }
    let linePromoTrigger = null;
    function showLinePromo() {
      const isEvent = !!getEventId();
      if (isEvent && DATA?.eventInfo?.linePromo !== true) return;
      try { if (localStorage.getItem(LINE_DISMISS_KEY)) return; } catch (e) {}
      let fired = false;
      const open = () => {
        if (document.body.classList.contains("modal-open")) { setTimeout(open, 3000); return; }
        try { if (localStorage.getItem(LINE_DISMISS_KEY)) return; } catch (e) {}
        $("linePopup").classList.remove("hidden");
        document.body.classList.add("modal-open");
      };
      const trigger = () => {
        if (fired) return;
        fired = true;
        window.removeEventListener("scroll", onScroll);
        clearTimeout(timer);
        linePromoTrigger = null;
        setTimeout(open, 400);
      };
      const scrollNeed = isEvent ? 300 : 120;
      const onScroll = () => { if (window.scrollY > scrollNeed) trigger(); };
      const timer = setTimeout(trigger, isEvent ? 30000 : 5000);
      window.addEventListener("scroll", onScroll, { passive: true });
      linePromoTrigger = trigger;
    }
    function showInstallBanner() {
      if (!getEventId() || isStandalone()) return;
      try { if (localStorage.getItem(INSTALL_DISMISS_KEY)) return; } catch (e) {}
      if (!deferredPrompt && !isIos()) return;
      $("installBanner").classList.remove("hidden");
    }
    function hideInstallBanner() { $("installBanner").classList.add("hidden"); }
    function iosInstallHelpHtml() {
      return `<div class="space-y-3 text-sm text-slate-700">`
        + `<p>Safari の共有メニューから、このページをホーム画面アプリとして追加できます。</p>`
        + `<ol class="space-y-2.5">`
        + `<li class="flex items-center gap-2.5">${icon("share", "w-5 h-5 text-brand-600 flex-shrink-0")}<span>画面下の「共有」ボタンをタップ</span></li>`
        + `<li class="flex items-center gap-2.5">${icon("plusSquare", "w-5 h-5 text-brand-600 flex-shrink-0")}<span>「ホーム画面に追加」を選択</span></li>`
        + `<li class="flex items-center gap-2.5">${icon("download", "w-5 h-5 text-brand-600 flex-shrink-0")}<span>右上の「追加」をタップして完了</span></li>`
        + `</ol></div>`;
    }
    function setupInstallPrompt() {
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        showInstallBanner();
      });
      window.addEventListener("appinstalled", () => { deferredPrompt = null; hideInstallBanner(); });
      $("installDismiss").addEventListener("click", () => {
        hideInstallBanner();
        try { localStorage.setItem(INSTALL_DISMISS_KEY, "1"); } catch (e) {}
      });
      $("installBtn").addEventListener("click", async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          hideInstallBanner();
        } else if (isIos()) {
          openModal("ホーム画面に追加", iosInstallHelpHtml());
        }
      });
    }

    // ---- イベント結線 ----
    document.querySelectorAll(".navbtn").forEach((b) =>
      b.addEventListener("click", () => {
        setTab(b.dataset.tab);
        if (linePromoTrigger) linePromoTrigger();
      })
    );

    // ---- スクロール連動のヘッダー縮小 ----
    (function () {
      const header = $("appHeader");
      let compact = false;
      window.addEventListener("scroll", () => {
        const y = window.scrollY;
        const next = compact ? y > 8 : y > 48;
        if (next !== compact) { compact = next; header.classList.toggle("is-compact", compact); }
      }, { passive: true });
    })();
    $("noticeBtn").addEventListener("click", openNotices);
    $("modalClose").addEventListener("click", closeModal);
    $("modalBackdrop").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeModal(); dismissLinePromo(); } });

    document.addEventListener("visibilitychange", () => { if (!document.hidden) updateNowMarker(false); });

    // ---- オフライン表示バナー ----
    function updateOnlineStatus() {
      $("offlineBanner").classList.toggle("hidden", navigator.onLine !== false);
    }
    window.addEventListener("online", updateOnlineStatus);
    window.addEventListener("offline", updateOnlineStatus);
    updateOnlineStatus();

    // ---- LINE ポップアップ結線 ----
    $("linePopupCta").setAttribute("href", LINE_PROMO_URL);
    $("linePopupCta").addEventListener("click", dismissLinePromo);
    $("linePopupClose").addEventListener("click", dismissLinePromo);
    $("linePopupLater").addEventListener("click", dismissLinePromo);
    $("linePopupBackdrop").addEventListener("click", dismissLinePromo);

    init();
  </script>
</body>
</html>
