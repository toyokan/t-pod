<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- 静的タイトルは汎用。読み込み後に events/<id>.json の eventInfo.title で上書きされる -->
  <title>プログラム / タイムテーブル</title>
  <meta name="description" content="教育イベント・研究会向けタイムテーブル PWA" />
  <meta name="apple-mobile-web-app-title" content="タイムテーブル" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f59e0b" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Tailwind CSS (Play CDN) — 要件によりCDN読込。SWでキャッシュしオフライン対応 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          // ブランドカラー（アクセント）= オレンジ寄りの黄色（amber）
          colors: {
            brand: {
              50: "#fffbeb", 100: "#fef3c7", 200: "#fde68a", 300: "#fcd34d",
              400: "#fbbf24", 500: "#f59e0b", 600: "#e69500", 700: "#b45309", 800: "#92400e",
            },
          },
          boxShadow: {
            card: "0 1px 2px 0 rgb(15 23 42 / 0.04), 0 1px 3px 0 rgb(15 23 42 / 0.06)",
            fab: "0 8px 24px -6px rgb(230 149 0 / 0.5)",
          },
        },
      },
      // 会場テーマカラー等は events/<id>.json から動的に組み立てるため、クラスを safelist で保持
      safelist: [
        "bg-blue-100", "text-blue-700", "bg-blue-500", "border-blue-300",
        "bg-emerald-100", "text-emerald-700", "bg-emerald-500", "border-emerald-300",
        "bg-amber-100", "text-amber-700", "bg-amber-500", "border-amber-300",
        "bg-violet-100", "text-violet-700", "bg-violet-500", "border-violet-300",
        "bg-rose-100", "text-rose-700", "bg-rose-500", "border-rose-300",
        "bg-slate-100", "text-slate-600", "bg-slate-300", "bg-slate-200",
        "bg-brand-100", "bg-brand-500", "text-brand-700", "text-white", "text-slate-400",
      ],
    };
  </script>
  <style>
    /* セーフエリア（ノッチ端末）対応 */
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
    .scroll-x { -webkit-overflow-scrolling: touch; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* カードのフェードイン */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: fadeInUp .28s ease both; }
    @media (prefers-reduced-motion: reduce) { .animate-in { animation: none; } html { scroll-behavior: auto; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- ===== Sticky ヘッダー ===== -->
  <header class="sticky top-0 z-30 max-w-md mx-auto bg-gradient-to-br from-brand-500 via-brand-500 to-brand-600 text-white shadow-lg rounded-b-2xl">
    <div class="px-4 pt-4 pb-3.5 text-center">
      <h1 id="eventTitle" class="text-3xl font-extrabold leading-none tracking-tight drop-shadow-sm">読み込み中…</h1>
      <p id="eventSubtitle" class="text-sm font-semibold text-white/90 mt-1.5 tracking-wide"></p>
    </div>
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main class="max-w-3xl mx-auto px-3 pt-4 pb-28">

    <!-- 読み込みエラー表示 -->
    <div id="errorBox" class="hidden bg-red-50 border border-red-300 text-red-700 rounded-lg p-4 text-sm">
      <p>データの読み込みに失敗しました。通信環境をご確認のうえ、ページを再読み込みしてください。</p>
      <a href="./" class="inline-block mt-2 text-brand-600 font-medium underline">イベント一覧へ戻る</a>
    </div>

    <!-- (0) イベント一覧（?id 無しのとき表示） -->
    <section id="view-list" class="view hidden">
      <h2 class="text-base font-bold text-slate-700 mb-3">イベント一覧</h2>
      <div id="eventList" class="space-y-3"></div>
    </section>

    <!-- (1) プログラム -->
    <section id="view-program" class="view">
      <!-- 日付切替タブ（タイムテーブル表示内の要素） -->
      <nav id="dateTabs" class="flex gap-1.5 mb-4 overflow-x-auto scroll-x" aria-label="開催日"></nav>
      <div id="themeBanner" class="hidden mb-4 bg-gradient-to-br from-brand-50 to-amber-50 border border-brand-100 rounded-xl p-3.5">
        <div class="text-[11px] text-brand-500 font-bold tracking-wide uppercase">テーマ</div>
        <div id="themeText" class="text-sm font-bold text-brand-800 leading-snug mt-0.5"></div>
      </div>
      <div id="dayMeta" class="text-xs font-semibold text-slate-500 mb-3"></div>
      <div id="timetable"></div>
    </section>

    <!-- (2) 資料 -->
    <section id="view-materials" class="view hidden space-y-5">
      <h2 class="text-base font-bold text-slate-700">資料・会場案内</h2>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">会場マップ</h3>
        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden">
          <img id="venueMap" alt="会場マップ" class="w-full" />
          <p id="venueNote" class="text-xs text-slate-600 p-3 leading-relaxed"></p>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">配布資料</h3>
        <div id="resourceLinks" class="space-y-2"></div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">アンケート・各種フォーム</h3>
        <div id="formLinks" class="space-y-2"></div>
      </div>
    </section>

    <!-- (3) 書籍 -->
    <section id="view-books" class="view hidden">
      <h2 class="text-base font-bold text-slate-700 mb-3">関連書籍・グッズ</h2>
      <div id="bookList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </section>
  </main>

  <!-- ===== FAB（お知らせ） ===== -->
  <button id="fab" aria-label="お知らせを見る"
    class="fixed right-4 bottom-24 z-30 w-14 h-14 rounded-2xl bg-brand-600 text-white shadow-fab flex items-center justify-center active:scale-95 transition">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
    <span id="fabBadge" class="hidden absolute -top-1.5 -right-1.5 bg-rose-500 text-white text-[11px] min-w-[20px] h-5 px-1 rounded-full items-center justify-center font-bold ring-2 ring-white"></span>
  </button>

  <!-- ===== ボトムナビ（3タブ） ===== -->
  <nav id="bottomNav" class="fixed bottom-0 inset-x-0 z-30 max-w-2xl mx-auto bg-white border-t border-slate-200/80 rounded-t-2xl shadow-[0_-4px_20px_-4px_rgba(15,23,42,0.12)] pb-safe">
    <div class="grid grid-cols-3 px-2 pt-1.5">
      <button data-tab="program" class="navbtn flex justify-center" aria-label="TIMETABLE">
        <span class="navpill flex flex-col items-center gap-1 px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>TIMETABLE</span>
        </span>
      </button>
      <button data-tab="materials" class="navbtn flex justify-center" aria-label="FILES">
        <span class="navpill flex flex-col items-center gap-1 px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
          <span>FILES</span>
        </span>
      </button>
      <button data-tab="books" class="navbtn flex justify-center" aria-label="BOOKS">
        <span class="navpill flex flex-col items-center gap-1 px-5 py-1.5 rounded-2xl text-[11px] font-semibold transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
          <span>BOOKS</span>
        </span>
      </button>
    </div>
  </nav>

  <!-- ===== 汎用モーダル ===== -->
  <div id="modal" class="hidden fixed inset-0 z-40 flex items-end sm:items-center justify-center">
    <div id="modalBackdrop" class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto shadow-2xl animate-in">
      <div class="sticky top-0 bg-white/95 backdrop-blur flex items-center justify-between px-4 py-3 border-b border-slate-100">
        <h3 id="modalTitle" class="font-bold text-slate-800"></h3>
        <button id="modalClose" aria-label="閉じる" class="text-slate-400 hover:text-slate-600 rounded-lg p-1 -mr-1 transition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="p-4 text-sm text-slate-700 space-y-3"></div>
    </div>
  </div>

  <script>
    "use strict";

    // ---- 会場テーマカラー辞書 ----
    // events/<id>.json の rooms[].color が指すキー。クラスは <head> の safelist で保持。
    // chip=ラベル, dot=タイムライン上の点, border=カード左罫線。
    const COLOR = {
      blue:    { chip: "bg-blue-100 text-blue-700",       dot: "bg-blue-500",    border: "border-blue-300" },
      green:   { chip: "bg-emerald-100 text-emerald-700", dot: "bg-emerald-500", border: "border-emerald-300" },
      orange:  { chip: "bg-amber-100 text-amber-700",     dot: "bg-amber-500",   border: "border-amber-300" },
      purple:  { chip: "bg-violet-100 text-violet-700",   dot: "bg-violet-500",  border: "border-violet-300" },
      red:     { chip: "bg-rose-100 text-rose-700",       dot: "bg-rose-500",    border: "border-rose-300" },
    };
    const NEUTRAL = { chip: "bg-slate-100 text-slate-600", dot: "bg-slate-300", border: "border-slate-200" };

    // 会場ラベル → カラー（events/<id>.json の rooms から動的に構築。未定義はグレー扱い）
    let ROOM_COLOR = {};
    const roomColor = (label) => COLOR[ROOM_COLOR[label]] || NEUTRAL;

    // 運営系カテゴリ（受付・休憩など）は控えめに、授業・提案系は強調
    const isAdminCat = (cat) => /受付|昼食|昼休憩|休憩|閉会|事務|理事|挨拶|諸連絡/.test(cat || "");
    const catColor = (cat) => (isAdminCat(cat) ? "text-slate-500" : "text-brand-700");

    // ---- SVG アイコン（Lucide 系・stroke=currentColor） ----
    const ICONS = {
      calendar: '<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/>',
      mapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
      file: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8M16 13H8M16 17H8"/>',
      form: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
      book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2"/>',
      chevron: '<path d="m9 18 6-6-6-6"/>',
      clock: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
      alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4M12 17h.01"/>',
    };
    function icon(name, cls = "w-5 h-5") {
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}" aria-hidden="true">${ICONS[name] || ""}</svg>`;
    }

    // ---- 状態 ----
    let DATA = null;
    let activeDateId = null;
    let activeTab = "program";

    // ---- ユーティリティ ----
    const $ = (id) => document.getElementById(id);
    const el = (tag, cls, html) => {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html != null) e.innerHTML = html;
      return e;
    };
    const escapeHtml = (s) =>
      String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    // "2026-08-04" → 月日の表記（sep="月"→"8月4日" / sep="/"→"8/4"。先頭ゼロを除去）
    const fmtMD = (d, sep = "月") => {
      const [, m, day] = String(d || "").split("-");
      if (!m || !day) return "";
      return sep === "月" ? `${+m}月${+day}日` : `${+m}${sep}${+day}`;
    };

    // ---- 起動 ----
    // URL の ?id=<イベントID> を取得（不正値・パストラバーサルは除去）
    function getEventId() {
      const id = new URLSearchParams(location.search).get("id") || "";
      return /^[A-Za-z0-9_-]+$/.test(id) ? id : "";
    }

    // イベントモード（個別ページ）と一覧モードで表示要素を切り替える
    function setMode(mode) {
      const isEvent = mode === "event";
      $("dateTabs").classList.toggle("hidden", !isEvent);
      document.getElementById("bottomNav").classList.toggle("hidden", !isEvent);
      $("fab").classList.toggle("hidden", !isEvent);
      $("view-list").classList.toggle("hidden", isEvent);
      // 一覧モードではプログラム表示を隠す（イベントモードでは直後の setTab が表示制御）
      $("view-program").classList.toggle("hidden", !isEvent);
      // 一覧モードではボトムナビ分の余白を詰める
      document.querySelector("main").classList.toggle("pb-28", isEvent);
      document.querySelector("main").classList.toggle("pb-8", !isEvent);
    }

    async function init() {
      registerSW();
      const id = getEventId();
      try {
        if (id) {
          // ---- イベントモード ----
          const res = await fetch(`events/${id}.json`, { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          DATA = await res.json();
          setMode("event");
          renderAll();
        } else {
          // ---- 一覧モード ----
          const res = await fetch("events.json", { cache: "no-cache" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const index = await res.json();
          setMode("list");
          renderEventList(index);
        }
      } catch (err) {
        console.error(err);
        setMode("list");
        $("errorBox").classList.remove("hidden");
      }
    }

    // ---- イベント一覧（?id 無し） ----
    function renderEventList(index) {
      $("eventTitle").textContent = index.siteTitle || "イベント一覧";
      $("eventSubtitle").textContent = index.siteSubtitle || "";
      document.title = index.siteTitle || document.title;

      const wrap = $("eventList");
      wrap.innerHTML = "";
      const events = (index.events || [])
        .slice()
        .sort((a, b) => String(b.sortDate || "").localeCompare(String(a.sortDate || "")));

      if (!events.length) {
        wrap.appendChild(el("p", "text-sm text-slate-500 py-8 text-center", "公開中のイベントはありません。"));
        return;
      }

      events.forEach((ev, idx) => {
        const card = el("a", "group relative block bg-white border border-slate-200/80 rounded-xl p-4 pl-5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition animate-in overflow-hidden");
        card.href = "?id=" + encodeURIComponent(ev.id);
        card.style.animationDelay = idx * 40 + "ms";
        card.innerHTML =
          `<span class="absolute left-0 inset-y-0 w-1.5 bg-brand-500"></span>` +
          `<div class="text-sm font-bold text-slate-800 leading-snug pr-6">${escapeHtml(ev.title || ev.id)}</div>` +
          (ev.theme ? `<div class="text-xs text-brand-700 mt-1">テーマ：${escapeHtml(ev.theme)}</div>` : "") +
          (ev.dateRange ? `<div class="flex items-center gap-1.5 text-xs text-slate-500 mt-2">${icon("calendar", "w-4 h-4 text-slate-400")}<span>${escapeHtml(ev.dateRange)}</span></div>` : "") +
          (ev.venueName ? `<div class="flex items-center gap-1.5 text-xs text-slate-500 mt-1">${icon("mapPin", "w-4 h-4 text-slate-400")}<span>${escapeHtml(ev.venueName)}</span></div>` : "") +
          `<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 group-hover:text-brand-400 group-hover:translate-x-0.5 transition">${icon("chevron", "w-5 h-5")}</span>`;
        wrap.appendChild(card);
      });
    }

    function renderAll() {
      const info = DATA.eventInfo || {};
      $("eventTitle").textContent = info.logoMain || info.title || "イベント";
      $("eventSubtitle").textContent = info.logoSub || info.subtitle || "";
      document.title = info.title || document.title;
      const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if (appleTitle && info.title) appleTitle.setAttribute("content", info.title);

      // 会場カラー辞書を構築
      ROOM_COLOR = {};
      (DATA.rooms || []).forEach((r) => { ROOM_COLOR[r.id] = r.color; ROOM_COLOR[r.name] = r.color; });

      // テーマのバナー
      if (info.theme) {
        $("themeText").textContent = info.theme;
        $("themeBanner").classList.remove("hidden");
      }

      renderDateTabs();
      renderMaterials();
      renderBooks();
      renderNoticeBadge();
      // 初期表示
      setTab("program");
    }

    // ---- 日付タブ ----
    function renderDateTabs() {
      const tabs = $("dateTabs");
      tabs.innerHTML = "";
      const dates = (DATA.eventInfo && DATA.eventInfo.dates) || [];
      if (!activeDateId && dates.length) activeDateId = dates[0].id;

      dates.forEach((d) => {
        const isActive = d.id === activeDateId;
        const btn = el(
          "button",
          "flex-shrink-0 px-3.5 py-1.5 rounded-full text-sm font-semibold transition " +
            (isActive ? "bg-brand-500 text-white shadow-sm" : "bg-slate-100 text-slate-600 hover:bg-slate-200"),
          escapeHtml(d.label) +
            (d.date ? `<span class="ml-1 text-xs font-normal opacity-80">${escapeHtml(fmtMD(d.date, "/"))}${d.weekday ? "(" + escapeHtml(d.weekday) + ")" : ""}</span>` : "")
        );
        btn.onclick = () => { activeDateId = d.id; renderDateTabs(); };
        tabs.appendChild(btn);
      });
      renderTimetable();
    }

    // ---- タイムテーブル（縦型タイムライン: 時間 → 内容 → 詳細） ----
    function renderTimetable() {
      const wrap = $("timetable");
      wrap.innerHTML = "";

      // この日の見出し（◯日目 8月4日(火) 10:00〜16:15）
      const dayObj = ((DATA.eventInfo && DATA.eventInfo.dates) || []).find((d) => d.id === activeDateId);
      if (dayObj) {
        const md = fmtMD(dayObj.date);
        $("dayMeta").textContent =
          `${dayObj.label || ""}　${md}${dayObj.weekday ? "(" + dayObj.weekday + ")" : ""}` +
          (dayObj.time ? `　${dayObj.time}` : "");
      } else {
        $("dayMeta").textContent = "";
      }

      const sessions = (DATA.sessions || []).filter((s) => s.dateId === activeDateId);
      if (!sessions.length) {
        wrap.appendChild(el("p", "text-sm text-slate-500 py-8 text-center", "この日のプログラムはまだ登録されていません。"));
        return;
      }

      const list = el("div", "space-y-3");
      sessions.forEach((s, idx) => {
        const row = el("div", "flex gap-3 animate-in");
        row.style.animationDelay = idx * 30 + "ms";

        // 時間カラム
        const time = el("div", "flex-shrink-0 w-12 text-right pt-2");
        time.innerHTML =
          `<div class="text-sm font-bold tabular-nums text-slate-700">${escapeHtml(s.start || "")}</div>` +
          (s.end ? `<div class="text-[11px] tabular-nums text-slate-400 leading-tight">${escapeHtml(s.end)}</div>` : "");
        row.appendChild(time);

        // タイムラインのレール（縦線＋点）
        const roomItem = (s.items || []).find((it) => it.room);
        const dot = roomItem ? roomColor(roomItem.room).dot : isAdminCat(s.category) ? NEUTRAL.dot : "bg-brand-500";
        const rail = el("div", "relative flex-shrink-0 w-4 border-l-2 border-slate-200 ml-0.5");
        rail.innerHTML = `<span class="absolute -left-[7px] top-2 w-3 h-3 rounded-full ring-4 ring-slate-50 ${dot}"></span>`;
        row.appendChild(rail);

        // 内容カード
        const card = el("div", "flex-1 min-w-0 bg-white border border-slate-200/80 rounded-xl p-3.5 shadow-card");
        let html = `<div class="text-sm font-bold ${catColor(s.category)}">${escapeHtml(s.category || "")}</div>`;
        if (s.note) html += `<p class="text-xs text-slate-500 mt-1 leading-relaxed">${escapeHtml(s.note)}</p>`;
        (s.items || []).forEach((it) => {
          html += `<div class="mt-2.5 first:mt-1.5">`;
          if (it.room) {
            const c = roomColor(it.room);
            html += `<span class="inline-block align-middle text-[11px] font-bold px-2 py-0.5 rounded-full mr-1.5 ${c.chip}">${escapeHtml(it.room)}</span>`;
          }
          if (it.title) html += `<span class="align-middle text-sm font-semibold text-slate-800">${escapeHtml(it.title)}</span>`;
          (it.meta || []).forEach((m) => {
            html += `<div class="text-xs text-slate-600 leading-relaxed mt-0.5">${escapeHtml(m)}</div>`;
          });
          html += `</div>`;
        });
        card.innerHTML = html;
        row.appendChild(card);
        list.appendChild(row);
      });
      wrap.appendChild(list);
    }

    // ---- 資料タブ ----
    function renderMaterials() {
      const venue = (DATA.eventInfo && DATA.eventInfo.venue) || {};
      const map = $("venueMap");
      if (venue.mapImage) {
        map.src = venue.mapImage;
        map.classList.remove("hidden");
        // 画像取得失敗時は崩さず非表示（注記テキストは残す）
        map.onerror = () => map.classList.add("hidden");
      } else map.classList.add("hidden");
      $("venueNote").textContent = venue.mapNote || "";

      $("resourceLinks").innerHTML = "";
      (venue.resourceLinks || []).forEach((r) =>
        $("resourceLinks").appendChild(linkCard(r, "file"))
      );

      $("formLinks").innerHTML = "";
      ((DATA.eventInfo && DATA.eventInfo.forms) || []).forEach((f) =>
        $("formLinks").appendChild(linkCard(f, "form"))
      );
    }

    function linkCard(item, iconName) {
      const a = el(
        "a",
        "group flex items-center gap-3 bg-white border border-slate-200/80 rounded-xl p-3.5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition"
      );
      a.href = item.url || "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML =
        `<span class="flex-shrink-0 w-10 h-10 rounded-lg bg-brand-50 text-brand-600 flex items-center justify-center">${icon(iconName)}</span>` +
        `<span class="flex-1 min-w-0">` +
        `<span class="block text-sm font-semibold text-slate-800">${escapeHtml(item.label)}</span>` +
        (item.description ? `<span class="block text-xs text-slate-500 mt-0.5">${escapeHtml(item.description)}</span>` : "") +
        `</span>` +
        `<span class="text-slate-300 group-hover:text-brand-400 transition">${icon("chevron", "w-5 h-5")}</span>`;
      return a;
    }

    // ---- 書籍タブ ----
    function renderBooks() {
      const list = $("bookList");
      list.innerHTML = "";
      (DATA.books || []).forEach((b) => {
        const card = el("a", "flex gap-3 bg-white border border-slate-200/80 rounded-xl p-3.5 shadow-card hover:border-brand-300 hover:shadow-md active:bg-slate-50 transition");
        card.href = b.url || "#";
        card.target = "_blank";
        card.rel = "noopener";
        const placeholder = `<div class="w-16 h-24 flex-shrink-0 rounded-lg bg-brand-50 text-brand-400 flex items-center justify-center">${icon("book", "w-7 h-7")}</div>`;
        card.innerHTML =
          (b.cover ? "" : placeholder) +
          `<div class="min-w-0">` +
          `<div class="text-sm font-bold text-slate-800 leading-snug">${escapeHtml(b.title)}</div>` +
          (b.author ? `<div class="text-xs text-slate-500 mt-0.5">${escapeHtml(b.author)}</div>` : "") +
          (b.publisher ? `<div class="text-[11px] text-slate-400">${escapeHtml(b.publisher)}</div>` : "") +
          (b.description ? `<div class="text-xs text-slate-600 mt-1 line-clamp-3">${escapeHtml(b.description)}</div>` : "") +
          `</div>`;
        // 表紙画像は要素で生成し、取得失敗時は本アイコンのプレースホルダに差し替える
        if (b.cover) {
          const img = el("img", "w-16 h-24 object-cover rounded-lg flex-shrink-0 ring-1 ring-slate-200");
          img.src = b.cover;
          img.alt = "";
          img.loading = "lazy";
          img.addEventListener("error", () => { img.outerHTML = placeholder; });
          card.insertAdjacentElement("afterbegin", img);
        }
        list.appendChild(card);
      });
    }

    // ---- お知らせ（FAB） ----
    function renderNoticeBadge() {
      const notices = (DATA.eventInfo && DATA.eventInfo.notices) || [];
      const badge = $("fabBadge");
      if (notices.length) {
        badge.textContent = String(notices.length);
        badge.classList.remove("hidden");
        badge.classList.add("flex");
      }
    }

    function openNotices() {
      const info = DATA.eventInfo || {};
      const notices = info.notices || [];
      let body = "";
      // イベント概要
      body +=
        `<div class="bg-gradient-to-br from-brand-50 to-amber-50 border border-brand-100 rounded-xl p-4">` +
        `<div class="text-base font-bold text-brand-800 leading-snug">${escapeHtml(info.title || "")}</div>` +
        (info.tagline ? `<div class="text-xs text-brand-600 mt-0.5">${escapeHtml(info.tagline)}</div>` : "") +
        (info.theme ? `<div class="text-sm text-brand-700 mt-2 font-medium">テーマ：${escapeHtml(info.theme)}</div>` : "") +
        (info.dateRange ? `<div class="flex items-center gap-1.5 text-xs text-slate-600 mt-2.5">${icon("calendar", "w-4 h-4 text-brand-500")}<span>${escapeHtml(info.dateRange)}</span></div>` : "") +
        (info.venueName ? `<div class="flex items-center gap-1.5 text-xs text-slate-600 mt-1">${icon("mapPin", "w-4 h-4 text-brand-500")}<span>${escapeHtml(info.venueName)}</span></div>` : "") +
        `</div>`;
      if (!notices.length) body += `<p class="text-sm text-slate-500">現在お知らせはありません。</p>`;
      notices.forEach((n) => {
        const important = n.level === "important";
        body +=
          `<div class="rounded-xl p-3.5 ${important ? "bg-amber-50 border border-amber-200" : "bg-slate-50 border border-slate-200"}">` +
          `<div class="flex items-start gap-2 font-semibold text-sm ${important ? "text-amber-800" : "text-slate-700"}">` +
          (important ? icon("alert", "w-4 h-4 mt-0.5 flex-shrink-0") : "") +
          `<span>${escapeHtml(n.title)}</span></div>` +
          `<div class="text-sm text-slate-600 mt-1 leading-relaxed">${escapeHtml(n.body)}</div></div>`;
      });
      openModal("概要・お知らせ", body);
    }

    // ---- モーダル ----
    function openModal(title, html) {
      $("modalTitle").textContent = title;
      $("modalBody").innerHTML = html;
      $("modal").classList.remove("hidden");
    }
    function closeModal() { $("modal").classList.add("hidden"); }

    // ---- タブ切替 ----
    function setTab(tab) {
      activeTab = tab;
      ["program", "materials", "books"].forEach((t) => {
        $("view-" + t).classList.toggle("hidden", t !== tab);
      });
      document.querySelectorAll(".navbtn").forEach((b) => {
        const on = b.dataset.tab === tab;
        const pill = b.querySelector(".navpill");
        if (pill) {
          pill.classList.toggle("bg-brand-100", on);
          pill.classList.toggle("text-brand-700", on);
          pill.classList.toggle("text-slate-400", !on);
        }
      });
      // 日付タブはプログラムでのみ意味を持つ（表示は常に出してOK）
      window.scrollTo({ top: 0 });
    }

    // ---- Service Worker 登録 ----
    function registerSW() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗", e));
        });
      }
    }

    // ---- イベント結線 ----
    document.querySelectorAll(".navbtn").forEach((b) =>
      b.addEventListener("click", () => setTab(b.dataset.tab))
    );
    $("fab").addEventListener("click", openNotices);
    $("modalClose").addEventListener("click", closeModal);
    $("modalBackdrop").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    init();
  </script>
</body>
</html>
