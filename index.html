<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- 静的タイトルは汎用。読み込み後に data.json の eventInfo.title で上書きされる -->
  <title>プログラム / タイムテーブル</title>
  <meta name="description" content="教育イベント・研究会向けタイムテーブル PWA" />
  <meta name="apple-mobile-web-app-title" content="タイムテーブル" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Tailwind CSS (Play CDN) — 要件によりCDN読込。SWでキャッシュしオフライン対応 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // ルームのテーマカラーで使うクラスを Tailwind に認識させる（safelist）
    tailwind.config = {
      safelist: [
        "bg-blue-500", "bg-blue-50", "border-blue-500", "text-blue-700", "bg-blue-100",
        "bg-green-500", "bg-green-50", "border-green-500", "text-green-700", "bg-green-100",
        "bg-orange-500", "bg-orange-50", "border-orange-500", "text-orange-700", "bg-orange-100",
        "bg-purple-500", "bg-purple-50", "border-purple-500", "text-purple-700", "bg-purple-100",
        "bg-red-500", "bg-red-50", "border-red-500", "text-red-700", "bg-red-100",
      ],
    };
  </script>
  <style>
    /* セーフエリア（ノッチ端末）対応 */
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
    /* タイムテーブルの横スクロール時にスクロールバーを控えめに */
    .scroll-x { -webkit-overflow-scrolling: touch; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- ===== Sticky ヘッダー ===== -->
  <header class="sticky top-0 z-30 bg-blue-600 text-white shadow-md">
    <div class="px-4 pt-3 pb-2 flex items-center justify-between">
      <div>
        <h1 id="eventTitle" class="text-lg font-bold leading-tight">読み込み中…</h1>
        <p id="eventSubtitle" class="text-xs text-blue-100"></p>
      </div>
    </div>
    <!-- 日付切替タブ（プログラム表示に連動） -->
    <nav id="dateTabs" class="flex gap-1 px-3 pb-2 overflow-x-auto scroll-x" aria-label="開催日"></nav>
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main class="max-w-3xl mx-auto px-3 pt-4 pb-28">

    <!-- 読み込みエラー表示 -->
    <div id="errorBox" class="hidden bg-red-50 border border-red-300 text-red-700 rounded-lg p-4 text-sm">
      データの読み込みに失敗しました。通信環境をご確認のうえ、ページを再読み込みしてください。
    </div>

    <!-- (1) プログラム -->
    <section id="view-program" class="view">
      <div id="themeBanner" class="hidden mb-3 bg-blue-50 border border-blue-200 rounded-lg p-3">
        <div class="text-[11px] text-blue-500 font-semibold">テーマ</div>
        <div id="themeText" class="text-sm font-bold text-blue-800 leading-snug"></div>
      </div>
      <div id="dayMeta" class="text-xs font-medium text-slate-500 mb-3"></div>
      <div id="timetable"></div>
    </section>

    <!-- (2) 資料 -->
    <section id="view-materials" class="view hidden space-y-5">
      <h2 class="text-base font-bold text-slate-700">資料・会場案内</h2>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">会場マップ</h3>
        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden">
          <img id="venueMap" alt="会場マップ" class="w-full" />
          <p id="venueNote" class="text-xs text-slate-600 p-3 leading-relaxed"></p>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">配布資料</h3>
        <div id="resourceLinks" class="space-y-2"></div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-slate-600 mb-2">アンケート・各種フォーム</h3>
        <div id="formLinks" class="space-y-2"></div>
      </div>
    </section>

    <!-- (3) 書籍 -->
    <section id="view-books" class="view hidden">
      <h2 class="text-base font-bold text-slate-700 mb-3">関連書籍・グッズ</h2>
      <div id="bookList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </section>
  </main>

  <!-- ===== FAB（お知らせ） ===== -->
  <button id="fab" aria-label="お知らせを見る"
    class="fixed right-4 bottom-24 z-30 w-14 h-14 rounded-full bg-amber-500 text-white shadow-lg flex items-center justify-center text-2xl active:scale-95 transition">
    🔔
    <span id="fabBadge" class="hidden absolute -top-1 -right-1 bg-red-600 text-xs w-5 h-5 rounded-full items-center justify-center font-bold"></span>
  </button>

  <!-- ===== ボトムナビ（3タブ） ===== -->
  <nav class="fixed bottom-0 inset-x-0 z-30 bg-white border-t border-slate-200 pb-safe">
    <div class="max-w-3xl mx-auto grid grid-cols-3">
      <button data-tab="program" class="navbtn flex flex-col items-center py-2 text-xs gap-0.5">
        <span class="text-xl">🗓️</span><span>プログラム</span>
      </button>
      <button data-tab="materials" class="navbtn flex flex-col items-center py-2 text-xs gap-0.5">
        <span class="text-xl">📂</span><span>資料</span>
      </button>
      <button data-tab="books" class="navbtn flex flex-col items-center py-2 text-xs gap-0.5">
        <span class="text-xl">📚</span><span>書籍</span>
      </button>
    </div>
  </nav>

  <!-- ===== 汎用モーダル ===== -->
  <div id="modal" class="hidden fixed inset-0 z-40 flex items-end sm:items-center justify-center">
    <div id="modalBackdrop" class="absolute inset-0 bg-black/50"></div>
    <div class="relative bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto shadow-xl">
      <div class="sticky top-0 bg-white flex items-center justify-between px-4 py-3 border-b border-slate-100">
        <h3 id="modalTitle" class="font-bold text-slate-800"></h3>
        <button id="modalClose" aria-label="閉じる" class="text-slate-400 text-2xl leading-none px-2">×</button>
      </div>
      <div id="modalBody" class="p-4 text-sm text-slate-700 space-y-3"></div>
    </div>
  </div>

  <script>
    "use strict";

    // ---- ルームカラー辞書（Tailwind purge 回避のためクラスをハードコード） ----
    const COLOR = {
      blue:   { bar: "bg-blue-500",   chip: "bg-blue-100 text-blue-700",     block: "bg-blue-50 border-blue-500" },
      green:  { bar: "bg-green-500",  chip: "bg-green-100 text-green-700",   block: "bg-green-50 border-green-500" },
      orange: { bar: "bg-orange-500", chip: "bg-orange-100 text-orange-700", block: "bg-orange-50 border-orange-500" },
      purple: { bar: "bg-purple-500", chip: "bg-purple-100 text-purple-700", block: "bg-purple-50 border-purple-500" },
      red:    { bar: "bg-red-500",    chip: "bg-red-100 text-red-700",       block: "bg-red-50 border-red-500" },
    };
    const colorOf = (key) => COLOR[key] || COLOR.blue;

    // 会場ラベル → カラー（data.json の rooms から動的に構築。未定義はグレー扱い）
    let ROOM_COLOR = {};
    const roomColor = (label) => COLOR[ROOM_COLOR[label]] || { chip: "bg-slate-100 text-slate-600" };

    // 内容（カテゴリ）の見出し色：運営系は控えめ、授業・提案系は強調
    const catColor = (cat) =>
      /受付|昼食|昼休憩|閉会|事務|理事|挨拶|諸連絡/.test(cat || "") ? "text-slate-500" : "text-blue-700";

    // ---- 状態 ----
    let DATA = null;
    let activeDateId = null;
    let activeTab = "program";

    // ---- ユーティリティ ----
    const $ = (id) => document.getElementById(id);
    const el = (tag, cls, html) => {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html != null) e.innerHTML = html;
      return e;
    };
    const escapeHtml = (s) =>
      String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    // ---- 起動 ----
    async function init() {
      try {
        const res = await fetch("./data.json", { cache: "no-cache" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        DATA = await res.json();
        renderAll();
      } catch (err) {
        console.error(err);
        $("errorBox").classList.remove("hidden");
      }
      registerSW();
    }

    function renderAll() {
      const info = DATA.eventInfo || {};
      $("eventTitle").textContent = info.title || "イベント";
      $("eventSubtitle").textContent = info.subtitle || "";
      document.title = info.title || document.title;
      const appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if (appleTitle && info.title) appleTitle.setAttribute("content", info.title);

      // 会場カラー辞書を構築
      ROOM_COLOR = {};
      (DATA.rooms || []).forEach((r) => { ROOM_COLOR[r.id] = r.color; ROOM_COLOR[r.name] = r.color; });

      // テーマのバナー
      if (info.theme) {
        $("themeText").textContent = info.theme;
        $("themeBanner").classList.remove("hidden");
      }

      renderDateTabs();
      renderMaterials();
      renderBooks();
      renderNoticeBadge();
      // 初期表示
      setTab("program");
    }

    // ---- 日付タブ ----
    function renderDateTabs() {
      const tabs = $("dateTabs");
      tabs.innerHTML = "";
      const dates = (DATA.eventInfo && DATA.eventInfo.dates) || [];
      if (!activeDateId && dates.length) activeDateId = dates[0].id;

      dates.forEach((d) => {
        const isActive = d.id === activeDateId;
        const btn = el(
          "button",
          "flex-shrink-0 px-3 py-1.5 rounded-full text-sm font-medium transition " +
            (isActive ? "bg-white text-blue-700" : "bg-blue-500/40 text-white"),
          escapeHtml(d.label) +
            (d.date ? `<span class="ml-1 text-xs opacity-80">${escapeHtml(d.date.slice(5))}${d.weekday ? "(" + escapeHtml(d.weekday) + ")" : ""}</span>` : "")
        );
        btn.onclick = () => { activeDateId = d.id; renderDateTabs(); renderTimetable(); };
        tabs.appendChild(btn);
      });
      renderTimetable();
    }

    // ---- タイムテーブル（縦型タイムライン: 時間 → 内容 → 詳細） ----
    function renderTimetable() {
      const wrap = $("timetable");
      wrap.innerHTML = "";

      // この日の見出し（◯日目 8月4日(火) 10:00〜16:15）
      const dayObj = ((DATA.eventInfo && DATA.eventInfo.dates) || []).find((d) => d.id === activeDateId);
      if (dayObj) {
        const md = dayObj.date ? dayObj.date.slice(5).replace("-", "月") + "日" : "";
        $("dayMeta").textContent =
          `${dayObj.label || ""}　${md}${dayObj.weekday ? "(" + dayObj.weekday + ")" : ""}` +
          (dayObj.time ? `　${dayObj.time}` : "");
      } else {
        $("dayMeta").textContent = "";
      }

      const sessions = (DATA.sessions || []).filter((s) => s.dateId === activeDateId);
      if (!sessions.length) {
        wrap.appendChild(el("p", "text-sm text-slate-500 py-8 text-center", "この日のプログラムはまだ登録されていません。"));
        return;
      }

      const list = el("div", "space-y-2");
      sessions.forEach((s) => {
        const row = el("div", "flex gap-2");

        // 時間カラム
        const time = el("div", "flex-shrink-0 w-16 text-right pt-2.5");
        time.innerHTML =
          `<div class="text-sm font-bold text-slate-700">${escapeHtml(s.start || "")}</div>` +
          (s.end ? `<div class="text-[11px] text-slate-400 leading-tight">｜${escapeHtml(s.end)}</div>` : "");
        row.appendChild(time);

        // 内容カード
        const card = el("div", "flex-1 min-w-0 bg-white border border-slate-200 rounded-lg p-3");
        let html = `<div class="text-sm font-bold ${catColor(s.category)}">${escapeHtml(s.category || "")}</div>`;
        if (s.note) html += `<p class="text-xs text-slate-500 mt-1 leading-relaxed">${escapeHtml(s.note)}</p>`;
        (s.items || []).forEach((it) => {
          html += `<div class="mt-2 first:mt-1">`;
          if (it.room) {
            const c = roomColor(it.room);
            html += `<span class="inline-block align-middle text-[11px] font-bold px-2 py-0.5 rounded-full mr-1.5 ${c.chip}">${escapeHtml(it.room)}</span>`;
          }
          if (it.title) html += `<span class="align-middle text-sm font-medium text-slate-800">${escapeHtml(it.title)}</span>`;
          (it.meta || []).forEach((m) => {
            html += `<div class="text-xs text-slate-600 leading-relaxed">${escapeHtml(m)}</div>`;
          });
          html += `</div>`;
        });
        card.innerHTML = html;
        row.appendChild(card);
        list.appendChild(row);
      });
      wrap.appendChild(list);
    }

    // ---- 資料タブ ----
    function renderMaterials() {
      const venue = (DATA.eventInfo && DATA.eventInfo.venue) || {};
      const map = $("venueMap");
      if (venue.mapImage) { map.src = venue.mapImage; map.classList.remove("hidden"); }
      else map.classList.add("hidden");
      $("venueNote").textContent = venue.mapNote || "";

      $("resourceLinks").innerHTML = "";
      (venue.resourceLinks || []).forEach((r) =>
        $("resourceLinks").appendChild(linkCard(r, "📄"))
      );

      $("formLinks").innerHTML = "";
      ((DATA.eventInfo && DATA.eventInfo.forms) || []).forEach((f) =>
        $("formLinks").appendChild(linkCard(f, "📝"))
      );
    }

    function linkCard(item, icon) {
      const a = el(
        "a",
        "flex items-center gap-3 bg-white border border-slate-200 rounded-lg p-3 active:bg-slate-50 transition"
      );
      a.href = item.url || "#";
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML =
        `<span class="text-xl">${icon}</span>` +
        `<span class="flex-1 min-w-0">` +
        `<span class="block text-sm font-medium text-slate-800">${escapeHtml(item.label)}</span>` +
        (item.description ? `<span class="block text-xs text-slate-500">${escapeHtml(item.description)}</span>` : "") +
        `</span><span class="text-slate-400">›</span>`;
      return a;
    }

    // ---- 書籍タブ ----
    function renderBooks() {
      const list = $("bookList");
      list.innerHTML = "";
      (DATA.books || []).forEach((b) => {
        const card = el("a", "flex gap-3 bg-white border border-slate-200 rounded-lg p-3 active:bg-slate-50 transition");
        card.href = b.url || "#";
        card.target = "_blank";
        card.rel = "noopener";
        const cover = b.cover
          ? `<img src="${escapeHtml(b.cover)}" alt="" class="w-16 h-24 object-cover rounded flex-shrink-0" />`
          : `<div class="w-16 h-24 flex-shrink-0 rounded bg-blue-100 text-blue-700 flex items-center justify-center text-2xl">📕</div>`;
        card.innerHTML =
          cover +
          `<div class="min-w-0">` +
          `<div class="text-sm font-bold text-slate-800 leading-snug">${escapeHtml(b.title)}</div>` +
          (b.author ? `<div class="text-xs text-slate-500 mt-0.5">${escapeHtml(b.author)}</div>` : "") +
          (b.publisher ? `<div class="text-[11px] text-slate-400">${escapeHtml(b.publisher)}</div>` : "") +
          (b.description ? `<div class="text-xs text-slate-600 mt-1 line-clamp-3">${escapeHtml(b.description)}</div>` : "") +
          `</div>`;
        list.appendChild(card);
      });
    }

    // ---- お知らせ（FAB） ----
    function renderNoticeBadge() {
      const notices = (DATA.eventInfo && DATA.eventInfo.notices) || [];
      const badge = $("fabBadge");
      if (notices.length) {
        badge.textContent = String(notices.length);
        badge.classList.remove("hidden");
        badge.classList.add("flex");
      }
    }

    function openNotices() {
      const info = DATA.eventInfo || {};
      const notices = info.notices || [];
      let body = "";
      // イベント概要
      body +=
        `<div class="bg-blue-50 border border-blue-200 rounded-lg p-3">` +
        `<div class="text-base font-bold text-blue-800 leading-snug">${escapeHtml(info.title || "")}</div>` +
        (info.tagline ? `<div class="text-xs text-blue-600 mt-0.5">${escapeHtml(info.tagline)}</div>` : "") +
        (info.theme ? `<div class="text-sm text-blue-700 mt-2 font-medium">テーマ：${escapeHtml(info.theme)}</div>` : "") +
        (info.dateRange ? `<div class="text-xs text-slate-600 mt-2">📅 ${escapeHtml(info.dateRange)}</div>` : "") +
        (info.venueName ? `<div class="text-xs text-slate-600">📍 ${escapeHtml(info.venueName)}</div>` : "") +
        `</div>`;
      if (!notices.length) body += `<p>現在お知らせはありません。</p>`;
      notices.forEach((n) => {
        const important = n.level === "important";
        body +=
          `<div class="rounded-lg p-3 ${important ? "bg-amber-50 border border-amber-300" : "bg-slate-50 border border-slate-200"}">` +
          `<div class="font-semibold text-sm ${important ? "text-amber-800" : "text-slate-700"}">${important ? "❗ " : ""}${escapeHtml(n.title)}</div>` +
          `<div class="text-sm text-slate-600 mt-1 leading-relaxed">${escapeHtml(n.body)}</div></div>`;
      });
      openModal("概要・お知らせ", body);
    }

    // ---- モーダル ----
    function openModal(title, html) {
      $("modalTitle").textContent = title;
      $("modalBody").innerHTML = html;
      $("modal").classList.remove("hidden");
    }
    function closeModal() { $("modal").classList.add("hidden"); }

    // ---- タブ切替 ----
    function setTab(tab) {
      activeTab = tab;
      ["program", "materials", "books"].forEach((t) => {
        $("view-" + t).classList.toggle("hidden", t !== tab);
      });
      document.querySelectorAll(".navbtn").forEach((b) => {
        const on = b.dataset.tab === tab;
        b.classList.toggle("text-blue-600", on);
        b.classList.toggle("font-bold", on);
        b.classList.toggle("text-slate-500", !on);
      });
      // 日付タブはプログラムでのみ意味を持つ（表示は常に出してOK）
      window.scrollTo({ top: 0 });
    }

    // ---- Service Worker 登録 ----
    function registerSW() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗", e));
        });
      }
    }

    // ---- イベント結線 ----
    document.querySelectorAll(".navbtn").forEach((b) =>
      b.addEventListener("click", () => setTab(b.dataset.tab))
    );
    $("fab").addEventListener("click", openNotices);
    $("modalClose").addEventListener("click", closeModal);
    $("modalBackdrop").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    init();
  </script>
</body>
</html>
